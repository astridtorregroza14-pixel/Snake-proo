<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake PRO ULTRA FINAL</title>

<style>
body{margin:0;background:#111;color:white;font-family:Arial;text-align:center;}
.screen{display:none;}
.active{display:block;}
canvas{background:#222;border:3px solid cyan;margin:auto;display:block;}
.btn{background:orange;padding:10px;margin:5px;border-radius:10px;display:inline-block;}

/* CONTROLES */
.controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);}
.controlBtn{background:#00ffcc;padding:15px;margin:5px;border-radius:10px;display:inline-block;}

/* CAJA */
#boxAnim{font-size:60px;}
.shake{animation:shake .3s infinite;}
@keyframes shake{50%{transform:translate(3px,-3px)}}

/* ULTRA */
.ultraBG{animation:rainbowBG 1s infinite;}
@keyframes rainbowBG{
0%{background:red;}20%{background:orange;}40%{background:yellow;}
60%{background:green;}80%{background:blue;}100%{background:violet;}
}
#ultraText{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
font-size:40px;display:none;animation:zoom .5s infinite alternate;}
@keyframes zoom{from{transform:translate(-50%,-50%) scale(1)}
to{transform:translate(-50%,-50%) scale(1.3)}}

/* RULETA */
#roulette{font-size:30px;height:40px;}
.spin{animation:spin .1s linear infinite;}
@keyframes spin{100%{transform:translateY(-40px)}}

/* PASE */
#passRewards{display:flex;overflow-x:auto;}
#passRewards .btn{min-width:200px}

/* EFECTOS */
.claimEffect,.levelUp{
position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%);
font-size:40px;animation:pop .8s;
}
@keyframes pop{0%{scale:0}50%{scale:1.5}100%{scale:1}}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="screen active">
<h1>🐍 Snake PRO ULTRA</h1>
<div id="invUI"></div>

<div class="btn" onclick="goTo('game')">▶️</div>
<div class="btn" onclick="goTo('boxes')">📦</div>
<div class="btn" onclick="goTo('skins')">🎭</div>
<div class="btn" onclick="goTo('shop')">🛒</div>
<div class="btn" onclick="goTo('pass')">🎟️</div>

<p>🔑 <span id="keysUI"></span></p>
</div>

<!-- GAME -->
<div id="game" class="screen">
<div class="btn" onclick="goTo('menu')">⬅️</div>
<canvas id="canvas" width="400" height="400"></canvas>
</div>

<!-- CAJA -->
<div id="boxes" class="screen">
<div class="btn" onclick="goTo('menu')">⬅️</div>
<div class="btn" onclick="openBox()">📦 Abrir</div>
<div id="boxAnim">📦</div>
<div id="ultraText">🌈 ULTRA 🌈</div>
<div id="boxResult"></div>
</div>

<!-- SKINS -->
<div id="skins" class="screen">
<div class="btn" onclick="goTo('menu')">⬅️</div>
<div id="skinsList"></div>
</div>

<!-- SHOP -->
<div id="shop" class="screen">
<div class="btn" onclick="goTo('menu')">⬅️</div>

<h3>🎭 Skins</h3>
<div id="shopSkins"></div>

<h3>📦 Packs</h3>
<div id="shopPacks"></div>
<div id="roulette"></div>

<h3>🔑 Llaves</h3>
<div class="btn" onclick="claimKeys()">🎁 Reclamar</div>
<p id="timerText"></p>
</div>

<!-- PASS -->
<div id="pass" class="screen">
<div class="btn" onclick="goTo('menu')">⬅️</div>

<h2>🎟️ Pase</h2>
<p id="seasonTimer"></p>

<div class="btn" onclick="buyPremium()">💎 Premium</div>
<p id="premiumStatus"></p>

<p>Nivel: <span id="passLevelUI"></span></p>
<div class="btn" onclick="buyPassLevel()">⬆️ Nivel</div>

<div id="passRewards"></div>
</div>

<script>
// DATOS
let inventory={monedas:0,gemas:0,fuerza:0,creditos:0};
let keys=0,lastClaim=0;
let skinsOwned=["Default"],currentSkin="Default";
let passLevel=1,passClaimed=[],premium=false;
let seasonEnd=Date.now()+604800000;

// GUARDAR
function saveGame(){
localStorage.setItem("save",JSON.stringify({
inventory,keys,lastClaim,skinsOwned,currentSkin,
passLevel,passClaimed,premium,seasonEnd
}));
}
function loadGame(){
let d=JSON.parse(localStorage.getItem("save"));
if(!d)return;
Object.assign(inventory,d.inventory);
keys=d.keys;lastClaim=d.lastClaim;
skinsOwned=d.skinsOwned;currentSkin=d.currentSkin;
passLevel=d.passLevel;passClaimed=d.passClaimed;
premium=d.premium;seasonEnd=d.seasonEnd;
}

// UI
function updateInventory(){
invUI.innerHTML=`🪙${inventory.monedas} 💎${inventory.gemas} 🎟️${inventory.creditos}`;
}
function updateKeysUI(){keysUI.innerText=keys}

// NAV
function goTo(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
if(id==="shop")loadShop();
if(id==="pass")updatePassUI();
}

// TIENDA
function loadShop(){
shopSkins.innerHTML=["Mítica","Legendaria","Ultra"].map(s=>
`<div class="btn">${s}<br><button onclick="buySkin('${s}')">💰100</button></div>`).join("");

shopPacks.innerHTML=`<div class="btn">📦<br><button onclick="buyRandomPack()">💰200</button></div>`;
}

function buySkin(s){
if(inventory.monedas<100)return;
inventory.monedas-=100;
if(!skinsOwned.includes(s))skinsOwned.push(s);
updateInventory();updateSkins();saveGame();
}

// RULETA
function buyRandomPack(){
if(inventory.monedas<200)return;
inventory.monedas-=200;updateInventory();

roulette.classList.add("spin");
let pool=["Default","Mítica","Legendaria","Ultra"];

let int=setInterval(()=>{
roulette.innerText=pool[Math.floor(Math.random()*4)];
},100);

setTimeout(()=>{
clearInterval(int);
roulette.classList.remove("spin");

let r=Math.random();
let reward=r<.1?"Ultra":r<.3?"Legendaria":r<.6?"Mítica":"Default";

roulette.innerText=reward;

if(!skinsOwned.includes(reward))skinsOwned.push(reward);
if(reward==="Ultra")ultraAnim();

updateSkins();saveGame();
},2000);
}

// LLAVES
function claimKeys(){
if(Date.now()-lastClaim<1800000)return alert("⏳");
keys+=3;lastClaim=Date.now();updateKeysUI();saveGame();
}

setInterval(()=>{
let d=1800000-(Date.now()-lastClaim);
timerText.innerText=d>0?Math.floor(d/60000)+"m":"Disponible";
},1000);

// CAJA
function openBox(){
if(keys<=0)return alert("❌");
keys--;updateKeysUI();

let r=Math.random();
let result="";

if(r<.1){skinsOwned.push("Ultra");ultraAnim();result="🌈 Ultra";}
else if(r<.3){skinsOwned.push("Legendaria");result="🟡";}
else if(r<.6){skinsOwned.push("Mítica");result="🟣";}
else{inventory.monedas+=50;result="🔵 monedas";}

boxResult.innerText=result;

updateInventory();updateSkins();saveGame();
}

// ULTRA
function ultraAnim(){
ultraText.style.display="block";
document.body.classList.add("ultraBG");
setTimeout(()=>{
ultraText.style.display="none";
document.body.classList.remove("ultraBG");
},2000);
}

// SKINS
function updateSkins(){
skinsList.innerHTML=skinsOwned.map(s=>`<div class="btn">${s}</div>`).join("");
}

// PASE
function buyPassLevel(){
if(inventory.creditos<50)return alert("❌");
inventory.creditos-=50;
passLevel++;
levelUpEffect();
updateInventory();updatePassUI();saveGame();
}

function levelUpEffect(){
let d=document.createElement("div");
d.className="levelUp";d.innerText="⬆️ NIVEL!";
document.body.appendChild(d);
setTimeout(()=>d.remove(),1000);
}

// PREMIUM
function buyPremium(){
if(inventory.gemas<200)return;
inventory.gemas-=200;premium=true;
updateInventory();updatePassUI();saveGame();
}

// RECOMPENSAS
function getFreeReward(l){
if(l==10)return "📦";
if(l==50)return "🌈";
return "🪙";
}
function getPremiumReward(l){
if(l==10)return "🎭";
if(l==50)return "🌈 Ultra";
return "💎";
}

function updatePassUI(){
passLevelUI.innerText=passLevel;
premiumStatus.innerText=premium?"💎 ACTIVO":"🔒";

let html="";
for(let i=1;i<=50;i++){
html+=`
<div class="btn">
Nivel ${i}<br>
🆓 ${getFreeReward(i)}<br>
💎 ${premium?getPremiumReward(i):"🔒"}
</div>`;
}
passRewards.innerHTML=html;
}

// TEMPORADA
setInterval(()=>{
let diff=seasonEnd-Date.now();
seasonTimer.innerText=diff>0?
Math.floor(diff/86400000)+"d":"Nueva temporada";

if(diff<=0){
passLevel=1;passClaimed=[];premium=false;
seasonEnd=Date.now()+604800000;
}
},1000);

// INIT
loadGame();
updateInventory();
updateKeysUI();
updateSkins();
updatePassUI();
</script>

</body>
</html>
